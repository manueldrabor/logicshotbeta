<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#ffffff"/>
  <!-- Anneau bleu extérieur -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#00B4FF" stroke-width="2.5"/>
  <!-- Anneau or -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#FFD700" stroke-width="2.25"/>
  <!-- Anneau bleu intérieur -->
  <circle cx="32" cy="32" r="9"  fill="none" stroke="#00B4FF" stroke-width="2.1"/>
  <!-- Dot or central -->
  <circle cx="32" cy="32" r="4"  fill="#FFD700"/>
  <!-- Centre blanc -->
  <circle cx="32" cy="32" r="1.8" fill="#ffffff"/>
  <!-- Croix bleue -->
  <line x1="35.2" y1="32"   x2="52.5" y2="32"   stroke="#00B4FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="11.5" y1="32"   x2="28.8" y2="32"   stroke="#00B4FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32"   y1="11.5" x2="32"   y2="28.8" stroke="#00B4FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32"   y1="35.2" x2="32"   y2="52.5" stroke="#00B4FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ticks diagonaux or -->
  <line x1="37.1" y1="26.9" x2="40.3" y2="23.7" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="37.1" y1="37.1" x2="40.3" y2="40.3" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26.9" y1="37.1" x2="23.7" y2="40.3" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26.9" y1="26.9" x2="23.7" y2="23.7" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
</svg>